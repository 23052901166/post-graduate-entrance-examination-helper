<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026考研上岸助力站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.13/dist/lunar.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        primary: '#1E40AF',
                        success: '#059669',
                        warning: '#F97316',
                        light: '#F8FAFC',
                        dark: '#0F12A'
                    }
                } 
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card { @apply bg-white/90 dark:bg-gray-800/90 rounded-2xl p-6 shadow-lg backdrop-blur-sm; }
            .text-gradient { @apply bg-gradient-to-r from-primary to-warning bg-clip-text text-transparent; }
            .animate-count { animation: count 0.6s ease; }
            @keyframes count { 0% { transform: scale(1.1); } 100% { transform: scale(1); } }
        }
        /* 核心：设置本地桌面背景图 */
        body { 
            min-height: 100vh;
            background: url('file:///Users/wangqixiang/Desktop/') no-repeat center center fixed;
            background-size: cover;
        }
        .dark body {
            background: url('file:///Users/wangqixiang/Desktop/') no-repeat center center fixed;
            background-size: cover;
            filter: brightness(0.8);
        }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-200">
    <!-- 导航栏 -->
    <nav class="sticky top-0 bg-white/90 dark:bg-gray-800/90 backdrop-blur-sm shadow z-10 py-3 px-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gradient">2026考研上岸</h1>
        <button id="themeBtn" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
            <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:inline text-warning"></i>
        </button>
    </nav>

    <div class="max-w-7xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6 mt-4">
        <!-- 左侧模块 -->
        <div class="md:col-span-2 space-y-6">
            <!-- 日期+倒计时 -->
            <div class="card">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-center md:text-left">
                    <div>
                        <h2 class="text-lg font-semibold mb-2">今日日期</h2>
                        <p id="solarDate" class="text-2xl font-bold"></p>
                        <p id="lunarDate" class="text-gray-500 mt-1"></p>
                    </div>
                    <div class="text-center">
                        <h2 class="text-lg font-semibold mb-2">2026考研倒计时</h2>
                        <div id="countDown" class="text-4xl font-bold text-gradient animate-count"></div>
                        <p class="text-sm text-gray-500 mt-1">初试时间：2026年12月20日</p>
                    </div>
                </div>
            </div>

            <!-- 诗词励志 -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-3">每日励志诗词</h2>
                <p id="dailyQuote" class="text-xl text-center py-6 italic text-gradient"></p>
            </div>

            <!-- 打卡功能 -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-4">每日学习打卡</h2>
                <div class="flex gap-6 mb-4 justify-center">
                    <div class="text-center">
                        <p class="text-3xl font-bold text-primary" id="totalDays">0</p>
                        <p class="text-sm">累计打卡</p>
                    </div>
                    <div class="text-center">
                        <p class="text-3xl font-bold text-warning" id="continueDays">0</p>
                        <p class="text-sm">连续打卡</p>
                    </div>
                </div>
                <div class="flex flex-col gap-3">
                    <input type="file" id="uploadImg" accept="image/*" class="hidden">
                    <label for="uploadImg" class="bg-primary text-white px-4 py-2 rounded-lg text-center"><i class="fas fa-upload mr-2"></i>上传照片</label>
                    <button id="checkInBtn" class="bg-success text-white px-4 py-2 rounded-lg"><i class="fas fa-check mr-2"></i>完成打卡</button>
                </div>
                <img id="previewImg" class="mt-4 w-full max-h-60 rounded-lg hidden">
                <div id="checkInWall" class="grid grid-cols-3 gap-2 mt-4 max-h-40 overflow-y-auto"></div>
            </div>
        </div>

        <!-- 右侧模块 -->
        <div class="space-y-6">
            <!-- 愿望清单 -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-4">上岸愿望清单</h2>
                <div class="flex gap-2">
                    <input id="wishInput" placeholder="写下你的愿望..." class="flex-1 px-3 py-2 rounded-lg border">
                    <button id="addWishBtn" class="px-3 py-2 bg-primary text-white rounded-lg"><i class="fas fa-plus"></i></button>
                </div>
                <ul id="wishList" class="mt-3 space-y-2 max-h-60 overflow-y-auto"></ul>
                <button id="resetWishBtn" class="mt-3 text-sm text-gray-500 hover:text-red-500">重置清单</button>
            </div>
        </div>
    </div>

    <script>
        // 1. 考研时间（2026年12月20日）
        const EXAM_DATE = new Date('2026-12-20');
        
        // 2. 经典励志诗词（完整）
        const QUOTES = [
            "长风破浪会有时，直挂云帆济沧海",
            "路漫漫其修远兮，吾将上下而求索",
            "千淘万漉虽辛苦，吹尽狂沙始到金",
            "宝剑锋从磨砺出，梅花香自苦寒来",
            "不经一番寒彻骨，怎得梅花扑鼻香",
            "博观而约取，厚积而薄发",
            "锲而不舍，金石可镂",
            "黄沙百战穿金甲，不破楼兰终不还",
            "穷且益坚，不坠青云之志",
            "大鹏一日同风起，扶摇直上九万里"
        ];

        // 3. 倒计时+日期
        function updateAll() {
            const now = new Date();
            // 公历
            document.getElementById('solarDate').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
            // 农历
            const lunar = Lunar.fromDate(now);
            document.getElementById('lunarDate').innerText = `${lunar.getYearInChinese()}年${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`;
            // 倒计时（仅天数）
            const diff = EXAM_DATE - now;
            const day = Math.ceil(diff / 86400000);
            document.getElementById('countDown').innerText = `${day} 天`;
        }
        setInterval(updateAll, 1000);
        updateAll();

        // 4. 每日诗词
        document.getElementById('dailyQuote').innerText = QUOTES[new Date().getDate() % QUOTES.length];

        // 5. 主题切换
        document.getElementById('themeBtn').onclick = () => {
            document.documentElement.classList.toggle('dark');
        };

        // 6. 打卡功能（保留）
        const uploadImg = document.getElementById('uploadImg');
        const previewImg = document.getElementById('previewImg');
        const checkInBtn = document.getElementById('checkInBtn');
        uploadImg.onchange = e => {
            const reader = new FileReader();
            reader.onload = res => {previewImg.src=res.target.result; previewImg.classList.remove('hidden');};
            reader.readAsDataURL(e.target.files[0]);
        };
        checkInBtn.onclick = () => {
            if(!previewImg.src) return alert('请先上传照片！');
            alert('打卡成功！');
        };

        // 7. 愿望清单（保留）
        const wishInput = document.getElementById('wishInput');
        const addWishBtn = document.getElementById('addWishBtn');
        const wishList = document.getElementById('wishList');
        addWishBtn.onclick = () => {
            if(!wishInput.value) return;
            const li = document.createElement('li');
            li.className = 'flex justify-between p-2 bg-gray-100 rounded-lg';
            li.innerHTML = `${wishInput.value}<button onclick="this.parentElement.remove()" class="text-red-500"><i class="fas fa-trash"></i></button>`;
            wishList.appendChild(li);
            wishInput.value = '';
        };
    </script>
</body>
</html>
