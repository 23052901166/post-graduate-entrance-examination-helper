<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027考研上岸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        primary: '#1E40AF',
                        success: '#059669',
                        warning: '#F97316',
                    }
                } 
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card { @apply bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg; }
            .btn { @apply px-4 py-2 rounded-lg font-medium transition-all hover:scale-105; }
            .text-gradient { @apply bg-gradient-to-r from-primary to-warning bg-clip-text text-transparent; }
            .animate-count { animation: count 0.6s ease; }
            @keyframes count { 0% { transform: scale(1.1); } 100% { transform: scale(1); } }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors">
    <nav class="sticky top-0 bg-white dark:bg-gray-800 shadow z-10 py-3 px-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gradient"><i class="fas fa-graduation-cap mr-2"></i>2027考研上岸</h1>
        <button id="themeBtn" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
            <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:inline"></i>
        </button>
    </nav>

    <div class="max-w-7xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6 mt-4">
        <div class="md:col-span-2 space-y-6">
            <!-- 日期 + 倒计时 -->
            <div class="card">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-center md:text-left">
                    <div>
                        <h2 class="text-lg font-semibold mb-2">今日日期</h2>
                        <p id="solarDate" class="text-2xl font-bold"></p>
                    </div>
                    <div class="text-center">
                        <h2 class="text-lg font-semibold mb-2">考研倒计时</h2>
                        <div id="countDown" class="text-4xl font-bold text-gradient animate-count"></div>
                        <p class="text-sm text-gray-500 mt-1">2027年12月27日初试</p>
                    </div>
                </div>
            </div>

            <!-- 每日励志 -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-3"><i class="fas fa-quote-left text-primary mr-2"></i>每日励志</h2>
                <p id="dailyQuote" class="text-xl text-center py-4 italic text-gradient"></p>
            </div>

            <!-- 每日打卡 -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-4"><i class="fas fa-check-circle text-success mr-2"></i>每日打卡</h2>
                <div class="flex gap-6 mb-4 justify-center">
                    <div class="text-center">
                        <p class="text-3xl font-bold text-primary" id="totalDays">0</p>
                        <p class="text-sm">累计打卡</p>
                    </div>
                    <div class="text-center">
                        <p class="text-3xl font-bold text-warning" id="continueDays">0</p>
                        <p class="text-sm">连续打卡</p>
                    </div>
                </div>
                <div class="flex flex-col gap-3">
                    <input type="file" id="uploadImg" accept="image/*" class="hidden">
                    <label for="uploadImg" class="btn bg-primary text-white"><i class="fas fa-upload mr-2"></i>上传照片</label>
                    <button id="checkInBtn" class="btn bg-success text-white"><i class="fas fa-check mr-2"></i>完成打卡</button>
                </div>
                <img id="previewImg" class="mt-4 w-full max-h-60 rounded-lg hidden">
                <div id="checkInWall" class="grid grid-cols-3 gap-2 mt-4 max-h-40 overflow-y-auto"></div>
            </div>
        </div>

        <!-- 愿望清单 -->
        <div class="space-y-6">
            <div class="card">
                <h2 class="text-lg font-semibold mb-4"><i class="fas fa-star text-warning mr-2"></i>上岸愿望清单</h2>
                <div class="flex gap-2">
                    <input id="wishInput" placeholder="写下你的愿望..." class="flex-1 px-3 py-2 rounded-lg border dark:border-gray-700 dark:bg-gray-700">
                    <button id="addWishBtn" class="px-3 py-2 bg-primary text-white rounded-lg"><i class="fas fa-plus"></i></button>
                </div>
                <ul id="wishList" class="mt-3 space-y-2 max-h-60 overflow-y-auto"></ul>
                <button id="resetWishBtn" class="mt-3 text-sm text-gray-500 hover:text-red-500">重置清单</button>
            </div>
        </div>
    </div>

    <script>
        // —— 核心配置：倒计时（绝对不会错）
        const EXAM_DATE = new Date('2027-12-27');
        
        // 励志语
        const QUOTES = [
            "彼方尚有荣光在，何须悲叹少年轻",
            "星光不负赶路人，时光不负考研人",
            "那些看似不起波澜的日复一日，会在某天让你看到坚持的意义",
            "苦尽甘来的那一天，山河星月都做贺礼",
            "你走的每一步，都藏着未来的影子"
        ];

        // —— 1. 日期 + 倒计时（纯天数，100%显示）
        function update() {
            const now = new Date();
            // 日期
            document.getElementById('solarDate').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
            // 倒计时（只显示天数）
            const diff = EXAM_DATE - now;
            const day = Math.ceil(diff / (1000 * 60 * 60 * 24));
            document.getElementById('countDown').innerText = `${day} 天`;
        }
        setInterval(update, 1000);
        update();

        // —— 2. 每日励志
        document.getElementById('dailyQuote').innerText = QUOTES[new Date().getDate() % QUOTES.length];

        // —— 3. 主题切换
        document.getElementById('themeBtn').onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };
        if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

        // —— 4. 打卡功能
        const uploadImg = document.getElementById('uploadImg');
        const previewImg = document.getElementById('previewImg');
        const checkInBtn = document.getElementById('checkInBtn');
        const totalDays = document.getElementById('totalDays');
        const continueDays = document.getElementById('continueDays');
        const checkInWall = document.getElementById('checkInWall');

        uploadImg.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (res) => {
                    previewImg.src = res.target.result;
                    previewImg.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        checkInBtn.onclick = () => {
            if(!previewImg.src) return alert('请先上传照片！');
            const today = new Date().toDateString();
            let data = JSON.parse(localStorage.getItem('checkIn') || '{"total":0,"continue":0,"last":"","imgs":[]}');
            
            if(data.last === today) return alert('今日已打卡！');
            
            data.total++;
            data.continue = (new Date(data.last).getTime() === new Date(today).getTime() - 86400000) ? data.continue + 1 : 1;
            data.last = today;
            data.imgs.unshift(previewImg.src);
            if(data.imgs.length > 20) data.imgs.pop();
            
            localStorage.setItem('checkIn', JSON.stringify(data));
            totalDays.innerText = data.total;
            continueDays.innerText = data.continue;
            checkInWall.innerHTML = data.imgs.map(img => `<img src="${img}" class="w-full h-20 rounded-lg">`).join('');
            alert('打卡成功！');
            previewImg.classList.add('hidden');
            uploadImg.value = '';
        };

        // 初始化打卡
        const checkData = JSON.parse(localStorage.getItem('checkIn') || '{"total":0,"continue":0,"last":"","imgs":[]}');
        totalDays.innerText = checkData.total;
        continueDays.innerText = checkData.continue;
        checkInWall.innerHTML = checkData.imgs.map(img => `<img src="${img}" class="w-full h-20 rounded-lg">`).join('');

        // —— 5. 愿望清单
        const wishInput = document.getElementById('wishInput');
        const addWishBtn = document.getElementById('addWishBtn');
        const wishList = document.getElementById('wishList');
        const resetWishBtn = document.getElementById('resetWishBtn');

        function renderWish() {
            const list = JSON.parse(localStorage.getItem('wishes') || '[]');
            wishList.innerHTML = list.map((item,i) => 
                `<li class="flex justify-between p-2 bg-gray-100 dark:bg-gray-700 rounded-lg">
                    <span>${item}</span>
                    <button onclick="del(${i})" class="text-red-500"><i class="fas fa-trash"></i></button>
                </li>`
            ).join('');
        }

        addWishBtn.onclick = () => {
            const val = wishInput.value.trim();
            if(!val) return alert('请输入内容！');
            const list = JSON.parse(localStorage.getItem('wishes') || '[]');
            list.push(val);
            localStorage.setItem('wishes', JSON.stringify(list));
            renderWish();
            wishInput.value = '';
        };

        window.del = (i) => {
            const list = JSON.parse(localStorage.getItem('wishes') || '[]');
            list.splice(i,1);
            localStorage.setItem('wishes', JSON.stringify(list));
            renderWish();
        };

        resetWishBtn.onclick = () => {
            if(confirm('确定清空？')) {
                localStorage.setItem('wishes', '[]');
                renderWish();
            }
        };

        renderWish();
    </script>
</body>
</html>
